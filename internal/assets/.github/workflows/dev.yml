name: Deploy to development

on:
  workflow_dispatch:
  push:
    branches:
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      ENVIRONMENT: dev
      REGISTRY: "ghcr.io"
      IMAGE: "${{ github.repository_owner }}/${{ github.event.repository.name }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          IMAGE_REPO="${{ env.REGISTRY }}/$(echo "${{ env.IMAGE }}" | tr '[:upper:]' '[:lower:]'):${SHORT_SHA}"
          docker build -t "${IMAGE_REPO}" .

      - name: Push image
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          IMAGE_REPO="${{ env.REGISTRY }}/$(echo "${{ env.IMAGE }}" | tr '[:upper:]' '[:lower:]'):${SHORT_SHA}"
          docker push "${IMAGE_REPO}"

      - name: Install g-deploy
        run: go install github.com/RomanshkVolkov/g-deploy@latest

      - name: Build deployment file
        env:
          # Add DEPLOY_app_* secrets here. Format: DEPLOY_<service>_<VARIABLE>
          # Example: DEPLOY_app_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DEPLOY_app_EXAMPLE: "some-secret-example"
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          IMAGE_REPO="${{ env.REGISTRY }}/$(echo "${{ env.IMAGE }}" | tr '[:upper:]' '[:lower:]'):${SHORT_SHA}"
          g-deploy build \
            -s "${{ github.event.repository.name }}" \
            -e "${{ env.ENVIRONMENT }}" \
            -i "${IMAGE_REPO}" \
            -h "${{ vars.HOST_DNS }}" \
            -p "${{ vars.PROXY }}" \
            -t "${{ vars.TLS }}" \
            -o "/tmp/${{ github.event.repository.name }}.${{ env.ENVIRONMENT }}.deployment.yml"

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.HOST_SSH_PRIVATE_KEY }}

      - name: Copy deployment file to server
        run: |
          FILE_PATH="/tmp/${{ github.event.repository.name }}.${{ env.ENVIRONMENT }}.deployment.yml"
          scp -o StrictHostKeyChecking=no -P ${{ secrets.HOST_SSH_PORT }} "$FILE_PATH" \
            ${{ secrets.HOST_SSH_USERNAME }}@${{ secrets.HOST_SSH_NAME }}:"$FILE_PATH"

      - name: Docker login on server
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.HOST_SSH_PORT }} \
            ${{ secrets.HOST_SSH_USERNAME }}@${{ secrets.HOST_SSH_NAME }} \
            "docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}"

      - name: Pull image on server
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          IMAGE_REPO="${{ env.REGISTRY }}/$(echo "${{ env.IMAGE }}" | tr '[:upper:]' '[:lower:]'):${SHORT_SHA}"
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.HOST_SSH_PORT }} \
            ${{ secrets.HOST_SSH_USERNAME }}@${{ secrets.HOST_SSH_NAME }} \
            "docker pull ${IMAGE_REPO}"

      - name: Deploy to Docker Swarm
        run: |
          FILE_PATH="/tmp/${{ github.event.repository.name }}.${{ env.ENVIRONMENT }}.deployment.yml"
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.HOST_SSH_PORT }} \
            ${{ secrets.HOST_SSH_USERNAME }}@${{ secrets.HOST_SSH_NAME }} \
            "docker stack deploy -c '${FILE_PATH}' ${{ github.event.repository.name }}-${{ env.ENVIRONMENT }}"

      - name: Clean up deployment files
        if: always()
        run: |
          FILE_PATH="/tmp/${{ github.event.repository.name }}.${{ env.ENVIRONMENT }}.deployment.yml"
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.HOST_SSH_PORT }} \
            ${{ secrets.HOST_SSH_USERNAME }}@${{ secrets.HOST_SSH_NAME }} \
            "rm -f /tmp/*.yml" || true
          rm -f "${FILE_PATH}" || true
