name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X main.version=${VERSION}"

          platforms="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64"
          for platform in $platforms; do
            OS="${platform%/*}"
            ARCH="${platform#*/}"
            OUTPUT="dist/guz-deploy-${OS}-${ARCH}"
            echo "Building ${OUTPUT}..."
            GOOS=$OS GOARCH=$ARCH go build -ldflags="$LDFLAGS" -o "$OUTPUT" .
          done

          # Windows
          echo "Building dist/guz-deploy-windows-amd64.exe..."
          GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/guz-deploy-windows-amd64.exe .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
